version: '3.8'

services:

  bff:
    build: ./biblioteca
    ports:
      - "8080:8080"
    environment:
      - SERVICES_MS_ROLES_URL=http://ms-roles:8081
      - SERVICES_MS_AUTH_URL=http://ms-auth:8082
      - SERVICES_MS_BIBLIOTECA_URL=http://ms-biblioteca:8083
      # Para desarrollo local, usa Azure Functions local (puerto 7071)
      # Para producción, cambia a: https://sumativa1.azurewebsites.net/api
      - AZURE_FUNCTION_BASE_URL=http://host.docker.internal:7071/api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ms-roles:
    build: ./ms-roles
    ports:
      - "8081:8081"
    volumes:
      - ./ms-roles/src/main/resources/wallet:/app/wallet
    environment:
      # Para desarrollo local, usa Azure Functions local (puerto 7071)
      # Para producción, cambia a: https://sumativa1.azurewebsites.net/api/notify/role
      - AZURE_FUNCTION_ROLE_NOTIFICATION_URL=http://host.docker.internal:7071/api/notify/role
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ms-auth:
    build: ./ms-auth
    ports:
      - "8082:8082"
    volumes:
      - ./ms-auth/src/main/resources/wallet:/app/wallet
    environment:
      # Para desarrollo local, usa Azure Functions local (puerto 7071)
      # Para producción, cambia a: https://sumativa1.azurewebsites.net/api/alert/suspicious
      - AZURE_FUNCTION_SUSPICIOUS_ACTIVITY_URL=http://host.docker.internal:7071/api/alert/suspicious
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ms-biblioteca:
    build: ./ms-biblioteca
    ports:
      - "8083:8083"
    volumes:
      - ./ms-biblioteca/src/main/resources/wallet:/app/wallet
    extra_hosts:
      - "host.docker.internal:host-gateway"
